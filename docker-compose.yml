    image: ${TRUSTGUARD_SKILL_IMAGE_PREFIX:-trustguard-skill-}nikto-scan:latest

  skill-fscan:
    profiles: ["skills"]
    build:
      context: ./skills/fscan
      dockerfile: Dockerfile
      args: *build-args
      extra_hosts: *build-extra-hosts
      network: *build-network
    image: ${TRUSTGUARD_SKILL_IMAGE_PREFIX:-trustguard-skill-}fscan:latest

  skill-metasploit:
