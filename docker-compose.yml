      args: *build-args
      extra_hosts: *build-extra-hosts
      network: *build-network
    image: ${TRUSTGUARD_SKILL_IMAGE_PREFIX:-trustguard-skill-}dirsearch:latest

  skill-ffuf-dir-enum:
