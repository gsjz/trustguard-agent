  skill-python-sandbox:
    profiles: ["skills"]
    build:
      context: ./skills/python-sandbox
      dockerfile: Dockerfile
      args: *build-args
      extra_hosts: *build-extra-hosts
      network: *build-network
    image: ${TRUSTGUARD_SKILL_IMAGE_PREFIX:-trustguard-skill-}python-sandbox:latest

  skill-sqlmap:
