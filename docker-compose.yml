    image: ${TRUSTGUARD_SKILL_IMAGE_PREFIX:-trustguard-skill-}katana:latest

  skill-dispatcher:
    profiles: ["skills"]
    build:
      context: ./skills
      dockerfile: dispatcher/Dockerfile
      args: *build-args
      extra_hosts: *build-extra-hosts
      network: *build-network
    image: ${TRUSTGUARD_SKILL_IMAGE_PREFIX:-trustguard-skill-}dispatcher:latest

  skill-nuclei:
    profiles: ["skills"]
    build:
      context: ./skills
      dockerfile: nuclei/Dockerfile
      args: *build-args
      extra_hosts: *build-extra-hosts
      network: *build-network
    image: ${TRUSTGUARD_SKILL_IMAGE_PREFIX:-trustguard-skill-}nuclei:latest

  skill-nikto-scan:
    profiles: ["skills"]
    build:
