id: local-struts2-s2-061-cmd-rce

info:
  name: Struts2 S2-061 Command Execution (CVE-2020-17530)
  author: pentest-platform
  severity: critical
  description: |
    Apache Struts 2.0.0 through 2.5.25 forced OGNL evaluation RCE.
    This template executes a safe echo command to confirm RCE capability.
  tags: safe-poc,exploit,struts2,s2-061,cve,cve2020,rce

