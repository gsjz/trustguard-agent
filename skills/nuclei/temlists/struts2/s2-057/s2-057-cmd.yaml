    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - "uid=[0-9]+.*gid=[0-9]+.*"

    extractors:
      - type: regex
        part: body
        name: rce_output
        regex:
          - "uid=[0-9]+.*gid=[0-9]+.*"