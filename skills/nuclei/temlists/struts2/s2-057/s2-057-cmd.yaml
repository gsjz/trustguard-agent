id: s2-057-cmd

info:
  name: Apache Struts2 S2-057 - Command Execution
  author: seal
  severity: critical
  description: Remote Command Execution via Namespace injection. Extracts command output directly.
  tags: exploit, struts2, cve, cve2018, rce

