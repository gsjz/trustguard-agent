# 渗透工具注册表：标注每个工具在 TRUSTGUARD_TOOLS_ROOT 下的位置
# Executor / 脚本通过本文件解析出可执行路径，便于扩展到 50+ 工具
#
# Skill 定义统一放在项目根目录 skills/。可构建 skill 需包含 SKILL.md、_meta.json、Dockerfile；
# 文档/占位 skill 可只提供 SKILL.md/_meta.json，不进入 skills profile。
# Skill 镜像构建通过根 docker-compose.yml 的 skills profile；构建单个镜像：
# docker compose --profile skills build skill-nmap
#
# 工具根目录：由环境变量 TRUSTGUARD_TOOLS_ROOT 指定。
# 路径：均相对于该根目录，例如 WebTesting/sqlmap-1.10 表示 {TRUSTGUARD_TOOLS_ROOT}/WebTesting/sqlmap-1.10
#
# 分类与架构文档 §7 对应：
#   NetworkScan / VulnScan / WebTesting / BruteForce / PostExploit / Search

# R5b 契约（与 executor app/registry_validation.py 一致，CI：tests/contracts/test_tools_registry_contract_unit.py）：
#   每个 skill 必填：category（非空字符串）、runner（python|binary）、path、executable
#   path / executable 可为 ""（表示脚本/PATH 模式）；可选 default_args: [标量列表]
# R5c（可选键 extract_kb_features，bool；省略=false）：
#   false/省略：默认 no-op — 禁止将「依赖包内 extract_kb_features 实现」的产物写入向量特征路径
#   true：声明 skills/<id>/kb_features.py 中 extract_kb_features；executor 挂载到 parsed_artifacts.kb_features
#   策略 API：executor app/kb_feature_policy.py、orchestrator core/kb_feature_policy.py
# 以下为示例与已配置项，按需增删
tools:

  curl-raw:
    category: Recon/ThreatModel/VulnScan/Exploit
    path: ""
    executable: ""
    runner: python

  # ---------- 网络扫描 ----------
  nmap:
    category: NetworkScan
    path: NetworkScan/nmap
    executable: nmap
    runner: binary
    extract_kb_features: true
    # 系统 PATH 中已有 nmap 时，path 可留空或填 ""

  # ---------- Web 枚举 ----------
  http-enum:
    category: WebRecon
    path: ""
    executable: ""
    runner: python

  httpx:
    category: WebRecon
    path: ""
    executable: ""
    runner: python

  ehole:
    category: WebRecon
    path: ""
    executable: ""
    runner: python

  #whatweb-fingerprint:
