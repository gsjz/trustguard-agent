  dirsearch:
    category: WebRecon
    path: ""
    executable: ""
    runner: python

  # Web 漏洞流水线：katana（发现）→ dispatcher（ETL/分片）→ nuclei（-l 分片扫描）
  katana:
    category: WebRecon
    path: ""
    executable: ""
    runner: python

  dispatcher:
    # 加入 ThreatModel/Exploit：THREAT_MODEL 阶段需 dispatcher 整合证据；EXPLOIT 阶段重组 chunk 驱动利用/复测扫描
    category: WebRecon/ThreatModel/VulnScan/Exploit
    path: ""
    executable: ""
    runner: python

  # ---------- 漏洞扫描 ----------
  nuclei:
    # 加入 Exploit：nuclei 带有 exploit tag 的模板可用于定向漏洞利用验证（如 S2-057 OGNL PoC），
    # 避免 EXPLOIT 阶段只剩 curl-raw 盲打（已观察到 task-0385... 的失效场景）
    category: VulnScan/Exploit
    path: VulnScan/nuclei
    executable: nuclei
    runner: python
    extract_kb_features: true

